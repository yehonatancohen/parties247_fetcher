version: "3.9"

services:
  goout-scraper:
    build: .
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # Give Playwright enough shared memory
    shm_size: "256mb"
    volumes:
      # Persist Playwright browser profile / session files if needed
      - playwright_data:/root/.cache/ms-playwright

volumes:
  playwright_data:
